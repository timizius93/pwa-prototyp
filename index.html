<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ENDURO Magazin #066 — Das neue Normal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #030303; }
body {
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  color: #fff; -webkit-font-smoothing: antialiased;
}

/* ─── APP SHELL ──────────────────────────────────────────────────────────── */
#app {
  width: 100%;
  max-width: 100%;
  margin: 0 auto;
  height: 100vh; height: 100dvh;
  overflow: hidden;
  position: relative;
  background: #0a0a0a;
}

/* ─── KIOSK ─────────────────────────────────────────────────────────────── */
.kiosk { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.kiosk-header { padding: 28px 24px 12px; display: flex; justify-content: space-between; align-items: center; }
.kiosk-logo { font-size: clamp(20px, 5vw, 28px); font-weight: 900; letter-spacing: -0.03em; }
.kiosk-sub { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.3; }
.btn-compare {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: #fff; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 8px 14px; border-radius: 6px; cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.featured {
  margin: 20px 24px; border-radius: 16px; padding: 32px 24px; position: relative;
  overflow: hidden; cursor: pointer; min-height: 280px; display: flex; flex-direction: column;
  justify-content: space-between;
}
.featured-bg-img {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center 20%; pointer-events: none;
}
.featured-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(160deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.45) 55%, rgba(0,0,0,0.75) 100%);
  border-radius: 16px; pointer-events: none;
}
.featured-tag { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.5; margin-bottom: 4px; }
.featured-issue { font-size: 11px; opacity: 0.3; }
.featured-title { font-size: clamp(24px, 6vw, 32px); font-weight: 900; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 12px; }
.featured-desc { font-size: 13px; opacity: 0.6; margin-bottom: 16px; }
.btn-read {
  display: inline-flex; align-items: center; gap: 8px; background: #0099CC; color: #fff;
  padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 700;
  letter-spacing: 0.05em; border: none; cursor: pointer; font-family: inherit;
}
.archive-label { padding: 8px 24px 12px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.3; }
.archive-grid { display: flex; gap: 14px; padding: 0 24px; }
.archive-card {
  flex: 1; border-radius: 12px; padding: 20px 14px; cursor: pointer; position: relative;
  overflow: hidden; min-height: 160px; display: flex; flex-direction: column; justify-content: flex-end;
}
.archive-card.trail { background: linear-gradient(160deg, #0d1117, #161b22, #238636, #2ea043); }
.archive-card.emtb  { background: linear-gradient(160deg, #1a1a1a, #2d1b4e, #5b2c6f, #e74c3c); }
.archive-num { font-size: 9px; opacity: 0.4; margin-bottom: 4px; }
.archive-title { font-size: 13px; font-weight: 800; line-height: 1.2; }
.archive-season { font-size: 9px; opacity: 0.35; margin-top: 6px; }
.install-hint {
  margin: 32px 24px 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 14px;
}
.install-icon { font-size: 22px; }
.install-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.install-desc { font-size: 11px; opacity: 0.4; line-height: 1.4; }
.offline-badge {
  padding: 0 24px 32px; text-align: center; font-size: 10px; opacity: 0.25;
  letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center;
  justify-content: center; gap: 6px;
}
.offline-dot { width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; display: inline-block; }

/* ─── COMPARE ────────────────────────────────────────────────────────────── */
.compare { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 28px 20px; }
.btn-back { background: none; border: none; color: #0099CC; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 20px; padding: 0; font-family: inherit; }
.compare-title { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 4px; }
.compare-sub { font-size: 12px; opacity: 0.4; margin-bottom: 28px; line-height: 1.5; }
.compare-headers { display: flex; margin-bottom: 20px; }
.compare-header { flex: 1; padding: 10px 12px; text-align: center; }
.compare-header.portal { background: rgba(255,255,255,0.04); border-radius: 8px 0 0 8px; }
.compare-header.mag    { background: rgba(0,153,204,0.1); border-radius: 0 8px 8px 0; border-left: 1px solid rgba(0,153,204,0.3); }
.ch-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.4; }
.ch-label.blue { color: #0099CC; opacity: 1; }
.ch-name { font-size: 11px; font-weight: 700; margin-top: 2px; }
.compare-row { margin-bottom: 2px; background: rgba(255,255,255,0.02); border-radius: 8px; padding: 14px 16px; }
.cr-feature { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #0099CC; font-weight: 700; margin-bottom: 10px; }
.cr-cols { display: flex; gap: 12px; }
.cr-col { flex: 1; font-size: 11px; line-height: 1.5; }
.cr-col.portal { opacity: 0.5; }
.cr-col.mag    { opacity: 0.85; }
.cr-divider { width: 1px; background: rgba(255,255,255,0.06); }
.btn-prototype {
  display: block; margin: 28px auto 0; background: #0099CC; color: #fff; border: none;
  padding: 12px 28px; border-radius: 8px; font-size: 12px; font-weight: 700;
  letter-spacing: 0.05em; cursor: pointer; font-family: inherit;
}

/* ─── READER SHELL ───────────────────────────────────────────────────────── */
.reader { height: 100%; display: flex; flex-direction: column; overflow: hidden; user-select: none; -webkit-user-select: none; }
.reader-top { padding: 12px 20px 8px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.btn-overview { background: none; border: none; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; opacity: 0.6; padding: 0; font-family: inherit; }
.page-counter { font-size: 10px; opacity: 0.3; letter-spacing: 0.1em; }
.progress { display: flex; gap: 3px; padding: 0 20px 6px; flex-shrink: 0; }
.progress-dot { flex: 1; height: 2px; border-radius: 1px; background: rgba(255,255,255,0.15); transition: background 0.4s ease; }
.progress-dot.active { background: #0099CC; }
.page-container { flex: 1; overflow: hidden; position: relative; }
.page-container.swiping { transition: none; }
.page-container.snap-back { transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
.nav-buttons { display: flex; gap: 8px; padding: 8px 20px 16px; flex-shrink: 0; justify-content: center; }
.btn-nav {
  flex: 1; max-width: 100px; padding: 10px; background: rgba(255,255,255,0.06);
  border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: 18px;
  opacity: 0.5; font-family: inherit; transition: opacity 0.15s, background 0.15s;
}
.btn-nav:hover:not(:disabled) { opacity: 0.9; background: rgba(255,255,255,0.12); }
.btn-nav:disabled { opacity: 0.15; cursor: default; background: rgba(255,255,255,0.02); }

/* ─── BASE PAGE ──────────────────────────────────────────────────────────── */
.page { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ─── 1. COVER MIT FOTO ──────────────────────────────────────────────────── */
.page-cover-photo {
  height: 100%; display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden; padding: 40px clamp(28px, 6vw, 80px) 32px;
}
.cover-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 30%; pointer-events: none; }
.cover-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(170deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.25) 45%, rgba(0,0,0,0.78) 100%); pointer-events: none; }
.cover-z { position: relative; z-index: 1; }
.cover-header-row { display: flex; justify-content: space-between; align-items: center; }
.cover-logo { font-size: clamp(20px, 5vw, 26px); font-weight: 900; letter-spacing: -0.02em; }
.cover-mag-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; }
.cover-issue-tag { display: inline-block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; background: #0099CC; color: #fff; padding: 3px 10px; border-radius: 4px; font-weight: 700; margin-bottom: 16px; }
.cover-title { font-size: clamp(40px, 10vw, 52px); font-weight: 900; line-height: 1.0; letter-spacing: -0.03em; margin-bottom: 14px; }
.cover-subtitle { font-size: clamp(12px, 3vw, 15px); line-height: 1.5; opacity: 0.65; max-width: 300px; }
.cover-footer-row { display: flex; justify-content: space-between; align-items: flex-end; }
.cover-issue-info { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.4; }
.cover-swipe-hint { font-size: 10px; opacity: 0.3; }

/* ─── 2. INHALTSVERZEICHNIS ──────────────────────────────────────────────── */
.page-toc { height: 100%; background: #0d0d0d; padding: 40px 28px; overflow-y: auto; }
.toc-issue { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.3; margin-bottom: 8px; }
.toc-title { font-size: clamp(28px, 7vw, 38px); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 32px; }
.toc-item { display: flex; align-items: flex-start; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.06); gap: 16px; }
.toc-item:last-child { border-bottom: none; }
.toc-num { font-size: 11px; font-weight: 700; color: #0099CC; min-width: 24px; font-variant-numeric: tabular-nums; padding-top: 2px; }
.toc-label { font-size: clamp(14px, 3.5vw, 16px); font-weight: 500; flex: 1; line-height: 1.3; }
.toc-sublabel { font-size: 11px; opacity: 0.35; margin-top: 3px; }
.toc-page { font-size: 11px; opacity: 0.25; font-variant-numeric: tabular-nums; padding-top: 2px; }

/* ─── 3. EDITORIAL ───────────────────────────────────────────────────────── */
.page-editorial { height: 100%; background: #0d0d0d; display: flex; flex-direction: column; overflow: hidden; }
.editorial-hero-img { width: 100%; height: clamp(180px, 35vw, 260px); object-fit: cover; object-position: center top; flex-shrink: 0; }
.editorial-hero-fade { height: 52px; background: linear-gradient(transparent, #0d0d0d); margin-top: -52px; position: relative; flex-shrink: 0; }
.editorial-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 28px 48px; }
.editorial-cat { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #0099CC; font-weight: 700; margin-bottom: 18px; }
.editorial-headline { font-size: clamp(30px, 8vw, 42px); font-weight: 900; letter-spacing: -0.03em; line-height: 1.0; margin-bottom: 8px; }
.editorial-subhead { font-size: clamp(13px, 3vw, 15px); opacity: 0.45; margin-bottom: 22px; font-style: italic; }
.editorial-byline { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; padding-bottom: 22px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.editorial-portrait { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; object-position: top; flex-shrink: 0; }
.editorial-author-name { font-size: 13px; font-weight: 700; }
.editorial-author-role { font-size: 11px; opacity: 0.4; margin-top: 2px; }
.editorial-lead { font-size: clamp(14px, 3.5vw, 17px); font-weight: 600; line-height: 1.65; margin-bottom: 22px; color: rgba(255,255,255,0.9); }
.editorial-text { font-size: clamp(13px, 3vw, 15px); line-height: 1.88; opacity: 0.62; margin-bottom: 18px; }
.editorial-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }
.editorial-pull-quote { padding: 18px 0 18px 20px; border-left: 3px solid #0099CC; margin: 24px 0; font-size: clamp(14px, 3.5vw, 17px); font-weight: 600; font-style: italic; line-height: 1.5; color: rgba(255,255,255,0.85); }
.editorial-signature { font-size: clamp(13px, 3vw, 15px); opacity: 0.5; margin-top: 28px; }

/* ─── 4. LESERUMFRAGE ────────────────────────────────────────────────────── */
.page-survey { height: 100%; background: #0d0d0d; padding: 36px 24px 48px; overflow-y: auto; }
.survey-headline { font-size: clamp(20px, 5vw, 26px); font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
.survey-sub { font-size: 12px; opacity: 0.4; margin-bottom: 24px; line-height: 1.4; }
.survey-img-card { background: #fff; border-radius: 14px; padding: 24px 20px; margin-bottom: 20px; text-align: center; }
.survey-img { width: 100%; height: auto; max-height: 110px; object-fit: contain; }
.survey-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.survey-stat { background: rgba(0,153,204,0.07); border: 1px solid rgba(0,153,204,0.2); border-radius: 10px; padding: 16px 12px; text-align: center; }
.survey-stat-val { font-size: clamp(22px, 5vw, 28px); font-weight: 900; color: #0099CC; letter-spacing: -0.02em; }
.survey-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.45; margin-top: 4px; }
.survey-body-text { font-size: clamp(13px, 3vw, 15px); line-height: 1.85; opacity: 0.62; margin-bottom: 18px; }
.survey-pull-quote { margin: 22px 0; padding: 18px 20px; border-left: 3px solid #0099CC; background: rgba(0,153,204,0.05); font-size: clamp(14px, 3.5vw, 17px); font-weight: 600; font-style: italic; line-height: 1.5; opacity: 0.85; }
.survey-mini-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 20px 0; }
.survey-mini-stat { text-align: center; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px 6px; }
.survey-mini-val { font-size: clamp(16px, 4vw, 20px); font-weight: 900; color: #fff; }
.survey-mini-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.35; margin-top: 3px; line-height: 1.3; }

/* ─── 5. FULLBLEED REAL ──────────────────────────────────────────────────── */
.page-fullbleed-real { height: 100%; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
.fullbleed-img-real { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }
.fullbleed-grad-real { position: absolute; bottom: 0; left: 0; width: 100%; height: 58%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
.fullbleed-text-real { position: relative; z-index: 1; padding: 0 28px 40px; }
.fullbleed-caption-real { font-size: clamp(13px, 3vw, 15px); line-height: 1.6; opacity: 0.75; margin-bottom: 8px; font-style: italic; }
.fullbleed-credit-real { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.3; }

/* ─── 6. VT HERO MIT FOTO ────────────────────────────────────────────────── */
.page-vt-hero { height: 100%; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
.vt-hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center center; }
.vt-hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.6) 45%, rgba(0,0,0,0.15) 100%); }
.vt-hero-content { position: relative; z-index: 1; padding: 0 28px 36px; }
.vt-hero-tag { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #0099CC; font-weight: 700; margin-bottom: 6px; }
.vt-hero-brand { font-size: 12px; opacity: 0.45; margin-bottom: 3px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.vt-hero-model { font-size: clamp(26px, 6.5vw, 36px); font-weight: 900; letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 14px; }
.vt-hero-lead { font-size: clamp(12px, 3vw, 14px); line-height: 1.65; opacity: 0.68; margin-bottom: 20px; }
.vt-hero-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.vt-hero-pill { font-size: 11px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; padding: 4px 10px; opacity: 0.85; }

/* ─── 7. BIKETEST ────────────────────────────────────────────────────────── */
.page-biketest { height: 100%; background: #0d0d0d; padding: 28px 24px 24px; overflow-y: auto; position: relative; }
.bt-tag { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #0099CC; font-weight: 700; margin-bottom: 6px; }
.bt-brand { font-size: 12px; opacity: 0.4; font-weight: 500; margin-bottom: 3px; letter-spacing: 0.05em; text-transform: uppercase; }
.bt-model { font-size: clamp(22px, 5.5vw, 30px); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 4px; line-height: 1.1; }
.bt-specs { display: flex; gap: 12px; margin-bottom: 16px; font-size: 12px; opacity: 0.5; flex-wrap: wrap; }
/* Photo wrapper — tap for geo overlay */
.bt-photo-wrap { position: relative; cursor: pointer; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
.bt-hero-photo { width: 100%; height: clamp(160px, 38vw, 210px); object-fit: cover; object-position: center; display: block; }
.bt-photo-hint {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
  border-radius: 6px; padding: 5px 9px; font-size: 10px; letter-spacing: 0.1em;
  display: flex; align-items: center; gap: 5px; pointer-events: none;
  border: 1px solid rgba(255,255,255,0.15);
}
.bt-rating { display: flex; align-items: center; gap: 16px; padding: 16px 18px; background: linear-gradient(135deg, rgba(0,153,204,0.18), rgba(0,153,204,0.06)); border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(0,153,204,0.2); }
.bt-score { font-size: clamp(36px, 9vw, 48px); font-weight: 900; color: #0099CC; line-height: 1; letter-spacing: -0.03em; }
.bt-winner { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.bt-verdict { font-size: 11px; opacity: 0.5; line-height: 1.4; }
.score-row { margin-bottom: 10px; }
.score-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 11px; letter-spacing: 0.05em; }
.score-label { text-transform: uppercase; opacity: 0.6; }
.score-value { font-weight: 700; }
.score-track { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); width: 0; }
.score-fill.high { background: #0099CC; }
.score-fill.mid  { background: #f39c12; }
.tops-flops { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0 18px; }
.tops-box  { background: rgba(0,153,204,0.08); border: 1px solid rgba(0,153,204,0.22); border-radius: 9px; padding: 12px 14px; }
.flops-box { background: rgba(231,76,60,0.07); border: 1px solid rgba(231,76,60,0.2);  border-radius: 9px; padding: 12px 14px; }
.tf-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
.tf-label.top  { color: #0099CC; }
.tf-label.flop { color: #e74c3c; }
.tf-item { font-size: clamp(11px, 2.5vw, 12px); opacity: 0.8; margin-bottom: 5px; line-height: 1.3; display: flex; gap: 5px; }
.tf-item::before { content: '·'; color: currentColor; opacity: 0.5; }
.bt-section-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.35; margin: 22px 0 12px; }
.bt-quote { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; font-size: clamp(12px, 2.8vw, 13px); line-height: 1.65; font-style: italic; opacity: 0.7; border-left: 2px solid rgba(0,153,204,0.4); }
.bt-body-text { font-size: clamp(13px, 3vw, 14px); line-height: 1.85; opacity: 0.62; margin-bottom: 14px; }

/* ─── GEOMETRIE OVERLAY ──────────────────────────────────────────────────── */
#geo-modal {
  display: none;
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(5,5,15,0.97);
  z-index: 200;
  flex-direction: column;
  padding: 28px 24px 40px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: geoSlideUp 0.25s cubic-bezier(0.16,1,0.3,1);
}
#geo-modal.active { display: flex; }
@keyframes geoSlideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.geo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.geo-title { font-size: clamp(20px, 5vw, 26px); font-weight: 900; letter-spacing: -0.02em; }
.geo-close-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 18px; line-height: 1; font-family: inherit; display: flex; align-items: center; justify-content: center; }

  /* ── 5. FULLBLEED YETI ─────────────────────────────────────────────────── */
  if (type === 'fullbleed-yeti') return `

      <img class="fullbleed-img-real" src="${IMG.yeti}" alt="">
      <div class="fullbleed-grad-real"></div>

        <div class="vt-hero-tag">Vergleichstest 2026</div>

        <div class="vt-hero-lead">Freeride-Bike mit Enduro-Ambitionen: 180 mm Federweg, Mullet-Setup, robuste Parts — und bergauf überraschend effizient. Warum es auch im Enduro-Vergleich zu den Favoriten zählt.</div>
        <div class="vt-hero-pills">
          <span class="vt-hero-pill">180 / 180 mm</span>
          <span class="vt-hero-pill">Mullet</span>

  /* ── 7. BIKETEST GHOST POACHA ──────────────────────────────────────────── */
  if (type === 'biketest-poacha') {
    const scores = [
      { l:'Bergauf',        v:76, cls:'mid'  },
      { l:'Bergab',         v:91, cls:'high' },
      { l:'Handling',       v:87, cls:'high' },
      { l:'Laufruhe',       v:89, cls:'high' },
      { l:'Preis-Leistung', v:74, cls:'mid'  },
    ];
    return `
      <div class="page page-biketest">
        <div class="bt-tag">BIKE-TEST</div>
        <div class="bt-brand">Ghost</div>
        <div class="bt-model">Poacha Full Party</div>
        <div class="bt-specs"><span>8.000 €</span><span>·</span><span>180 / 180 mm</span><span>·</span><span>17,6 kg</span><span>·</span><span>Mullet</span></div>
        <div class="bt-photo-wrap" onclick="toggleGeo()">
          <img class="bt-hero-photo" src="${IMG.poachaCard}" alt="Ghost Poacha Full Party">
          <div class="bt-photo-hint">📐 GEOMETRIE</div>
        </div>
        <div class="bt-rating">
          <div class="bt-score">88</div>
          <div>
            <div class="bt-winner">TESTFAVORIT</div>
            <div class="bt-verdict">Agil und laufruhig zugleich — Party bergab, ohne bergauf auszusteigen.</div>

        ${scores.map(s => `
          <div class="score-row">

        <div class="tops-flops">
          <div class="tops-box">
            <div class="tf-label top">Tops</div>
            <div class="tf-item">Starker Allrounder</div>
            <div class="tf-item">Durchdachter Spec</div>
            <div class="tf-item">Agilität + Laufruhe</div>
            <div class="tf-item">RockShox Ultimate</div>
          </div>
          <div class="flops-box">
            <div class="tf-label flop">Flops</div>
            <div class="tf-item">Hohes Gewicht</div>
            <div class="tf-item">Originale Griffe</div>
            <div class="tf-item">Kein Staufach</div>
          </div>
        </div>
        <div class="bt-section-title">Tester-Stimmen</div>
        <div class="bt-quote">„Die FULL-PARTY-Ausstattung lässt fast keine Wünsche offen und ihr könnt einfach draufsitzen und losballern."</div>
        <div class="bt-quote">„Schwer auf dem Papier, auf dem Trail aber superagil — zudem kommt ihr sicher durch Wurzelfelder und der Ride ist verdammt spaßig."</div>

  }

  /* ── 8. FULLBLEED POACHA ───────────────────────────────────────────────── */
  if (type === 'fullbleed-poacha') return `
    <div class="page page-fullbleed-real">

  return '<div class="page" style="display:flex;align-items:center;justify-content:center;height:100%;opacity:0.3">Seite nicht verfügbar</div>';
}

/* ═══════════════════════════════════════════════════════════════════════════
   GEOMETRIE OVERLAY
═══════════════════════════════════════════════════════════════════════════ */
function renderGeoModal() {
  return `
    <div class="geo-header">
      <div class="geo-title">Geometrie</div>
      <button class="geo-close-btn" onclick="toggleGeo()">×</button>
    </div>
    <div class="geo-bike-label">Ghost Poacha Full Party · Größe L</div>
    <div class="geo-chip-toggle">
      <button class="geo-chip-btn active" id="chip-low"  onclick="setGeoChip('low')">↓ LOW</button>
      <button class="geo-chip-btn"        id="chip-high" onclick="setGeoChip('high')">↑ HIGH</button>
    </div>
    <div class="geo-table">
      ${GEO.map(r => `
        <div class="geo-row">
          <span class="geo-key">${r.label}</span>
          <span class="geo-val geo-low">${r.low}</span>
          <span class="geo-val geo-high" style="display:none">${r.high}</span>
        </div>`).join('')}
    </div>
    <div class="geo-note">
      Flip-Chip in Sitzstrebe: LOW = slacker, tieferes Tretlager, mehr Reserven bergab. HIGH = ausgewogenere Balance, etwas direktere Front.<br><br>
      Erhältlich in S / M / L / XL · Mehr Infos: ghost-bikes.com
    </div>`;
}

function toggleGeo() {
  const modal = document.getElementById('geo-modal');
  if (!modal) return;
  modal.classList.toggle('active');
}

function setGeoChip(chip) {
  const lowBtn  = document.getElementById('chip-low');
  const highBtn = document.getElementById('chip-high');
  document.querySelectorAll('.geo-low').forEach(el  => el.style.display = chip === 'low'  ? '' : 'none');
  document.querySelectorAll('.geo-high').forEach(el => el.style.display = chip === 'high' ? '' : 'none');
  if (lowBtn)  { lowBtn.classList.toggle('active',  chip === 'low');  }
  if (highBtn) { highBtn.classList.toggle('active', chip === 'high'); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   ANIMATIONEN & NAVIGATION
═══════════════════════════════════════════════════════════════════════════ */
function animateScores() {
  document.querySelectorAll('.score-fill').forEach((el, i) => {
    setTimeout(() => { el.style.width = el.dataset.width + '%'; }, i * 130);
  });
}

function showKiosk()  { currentView = 'kiosk';   render(); }
function showCompare(){ currentView = 'compare';  render(); }
function openReader() { currentView = 'reader';   currentPage = 0; render(); }

function nextPage() {
  if (document.getElementById('geo-modal')?.classList.contains('active')) { toggleGeo(); return; }
  if (currentPage < PAGES.length - 1) { currentPage++; render(); }
}
function prevPage() {
  if (document.getElementById('geo-modal')?.classList.contains('active')) { toggleGeo(); return; }
  if (currentPage > 0) { currentPage--; render(); }
}

/* ─── Touch: Direction Locking ───────────────────────────────────────────── */
function onTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  swipeX      = 0;
  swipeDir    = null;
}

function onTouchMove(e) {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  /* Richtung nach ersten 10px sperren */
  if (!swipeDir && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
    swipeDir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
  }

  if (swipeDir === 'h') {
    swipeX = dx;
    const container = document.getElementById('pageContainer');
    if (container) {
      container.classList.add('swiping');
      container.style.transform = `translateX(${dx * 0.28}px)`;
    }
  }
  /* swipeDir === 'v': Browser scrollt den Seiteninhalt — nichts tun */
}

function onTouchEnd() {
  const container = document.getElementById('pageContainer');
  if (container) {
    container.classList.remove('swiping');
    container.classList.add('snap-back');
    container.style.transform = '';
    setTimeout(() => container?.classList.remove('snap-back'), 300);
  }

  if      (swipeX < -60) nextPage();
  else if (swipeX >  60) prevPage();

  swipeX   = 0;
  swipeDir = null;
}

/* ─── Keyboard Navigation ─────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (currentView !== 'reader') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    prevPage();
  if (e.key === 'Escape') {
    const modal = document.getElementById('geo-modal');
    if (modal?.classList.contains('active')) toggleGeo();
    else showKiosk();
  }
});

render();
</script>
